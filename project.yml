name: ScreenOS
options:
  bundleIdPrefix: com.clot
  deploymentTarget:
    macOS: "14.0"
  createIntermediateDirectories: true

settings:
  base:
    PRODUCT_NAME: ScreenOS
    PRODUCT_BUNDLE_IDENTIFIER: com.clot.screenos
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO
    COMBINE_HIDPI_IMAGES: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  ScreenOSKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/ScreenOSKit
    settings:
      base:
        PRODUCT_NAME: ScreenOSKit
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: 5.9
        DEFINES_MODULE: YES
        INSTALL_PATH: "@rpath"
        SKIP_INSTALL: YES

  ScreenOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/ScreenOS/main.swift
      - path: Sources/ScreenOS/Resources
    dependencies:
      - target: ScreenOSKit
        embed: true
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ScreenOS.entitlements
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO

  ScreenOSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ScreenOSTests
    dependencies:
      - target: ScreenOSKit
    settings:
      base:
        PRODUCT_NAME: ScreenOSTests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: 5.9
